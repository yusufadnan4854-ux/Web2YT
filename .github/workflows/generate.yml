name: Scheduled AI Video Render & Auto Upload

on:
  repository_dispatch:
    types: [trigger_rss_video]  
  workflow_dispatch:           

permissions:
  contents: write  

jobs:
  build-and-render:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Python Packages
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run AI Generator Engine
      env:
        VERCEL_BRIDGE_URL: ${{ secrets.VERCEL_BRIDGE_URL }}
        YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
        YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      run: |
        python generator.py

    - name: Commit & Push Processed URLs Database
      if: always()
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add processed_urls.txt || echo "No processed_urls.txt changed"
        git commit -m "Update Processed URLs Database [skip ci]" || echo "No changes to commit"
        git pull --rebase origin main || echo "No pull needed" # গিট পুশ কনফ্লিক্ট এড়ানোর ট্রিকস
        git push || echo "No push needed"